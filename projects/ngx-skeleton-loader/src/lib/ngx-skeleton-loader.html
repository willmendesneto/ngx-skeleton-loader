<div
  *ngFor="let item of items"
  class="skeleton-loader"
  [attr.aria-label]="ariaLabel"
  aria-busy="true"
  aria-valuemin="0"
  aria-valuemax="100"
  [attr.aria-valuetext]="loadingText"
  role="progressbar"
  tabindex="-1"
  [ngClass]="ngxSkeletonLoaderClasses"
  [ngStyle]="theme"
>
  <ng-content *ngIf="appearance  === 'custom-content'"></ng-content>
</div>
